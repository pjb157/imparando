name: Build Bundle

on:
  push:
    branches: [main]
    tags: ["v*"]
  workflow_dispatch:

permissions:
  contents: read
  packages: write

jobs:
  bundle:
    runs-on: ubuntu-22.04

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y debootstrap rsync e2fsprogs file curl ca-certificates

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo
        uses: Swatinem/rust-cache@v2

      - name: Build release binary
        run: cargo build --release

      - name: Build VM assets
        run: |
          sudo ./scripts/download-kernel.sh
          sudo ./scripts/download-ttyd.sh
          sudo ./scripts/build-rootfs.sh

      - name: Assemble bundle
        run: |
          rm -rf dist
          mkdir -p dist/bin dist/data
          cp target/release/imparando dist/bin/
          cp scripts/install-bundle.sh dist/
          sudo cp /var/lib/imparando/vmlinux dist/data/
          sudo cp /var/lib/imparando/ttyd dist/data/
          sudo cp /var/lib/imparando/base.ext4 dist/data/
          sudo chown -R "$USER":"$USER" dist
          tar -C dist -czf imparando-bundle-linux-amd64.tar.gz .

      - name: Upload bundle artifact
        uses: actions/upload-artifact@v4
        with:
          name: imparando-bundle-linux-amd64
          path: |
            imparando-bundle-linux-amd64.tar.gz
            dist/

      - name: Log in to GHCR
        if: github.event_name != 'pull_request'
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push GHCR image
        if: github.event_name != 'pull_request'
        uses: docker/build-push-action@v6
        with:
          context: .
          file: Dockerfile.bundle
          push: true
          tags: ghcr.io/${{ github.repository }}/bundle:latest

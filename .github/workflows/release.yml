name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      version:
        description: "Version tag to release (e.g. v0.1.0)"
        required: true

permissions:
  contents: write
  packages: write

jobs:
  release:
    runs-on: ubuntu-22.04

    env:
      VERSION: ${{ github.event.inputs.version || github.ref_name }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Validate tag format
        run: |
          case "$VERSION" in
            v[0-9]*.[0-9]*.[0-9]*) ;;
            *)
              echo "Invalid release tag: $VERSION" >&2
              exit 1
              ;;
          esac

      - name: Verify Cargo.toml version matches tag
        run: |
          CARGO_VERSION="$(sed -n 's/^version = "\(.*\)"/\1/p' Cargo.toml | head -1)"
          if [ "v$CARGO_VERSION" != "$VERSION" ]; then
            echo "Cargo.toml version ($CARGO_VERSION) does not match tag ($VERSION)" >&2
            exit 1
          fi

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y debootstrap rsync e2fsprogs file curl ca-certificates

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo
        uses: Swatinem/rust-cache@v2

      - name: Build release binary
        run: cargo build --release

      - name: Build VM assets
        run: |
          sudo ./scripts/download-kernel.sh
          sudo ./scripts/download-ttyd.sh
          sudo ./scripts/build-rootfs.sh

      - name: Assemble release bundle
        run: |
          rm -rf dist
          mkdir -p dist/bin dist/data
          cp target/release/imparando dist/bin/
          cp scripts/install-bundle.sh dist/
          sudo cp /var/lib/imparando/vmlinux dist/data/
          sudo cp /var/lib/imparando/ttyd dist/data/
          sudo cp /var/lib/imparando/base.ext4 dist/data/
          sudo chown -R "$USER":"$USER" dist
          tar -C dist -czf "imparando-bundle-${VERSION}-linux-amd64.tar.gz" .
          sha256sum "imparando-bundle-${VERSION}-linux-amd64.tar.gz" > "imparando-bundle-${VERSION}-linux-amd64.tar.gz.sha256"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ env.VERSION }}
          generate_release_notes: true
          files: |
            imparando-bundle-${{ env.VERSION }}-linux-amd64.tar.gz
            imparando-bundle-${{ env.VERSION }}-linux-amd64.tar.gz.sha256

      - name: Extract Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository }}/bundle
          tags: |
            type=raw,value=latest
            type=raw,value=${{ env.VERSION }}
            type=semver,pattern={{version}},value=${{ env.VERSION }}
            type=semver,pattern={{major}}.{{minor}},value=${{ env.VERSION }}

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push GHCR image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: Dockerfile.bundle
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}

<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Imparando</title>
  <link rel="icon" type="image/svg+xml" href="data:image/svg+xml;base64,PHN2ZyB4bWxucz0iaHR0cDovL3d3dy53My5vcmcvMjAwMC9zdmciIHZpZXdCb3g9IjAgMCAxNiAxNiI+PHJlY3Qgd2lkdGg9IjE2IiBoZWlnaHQ9IjE2IiByeD0iMyIgZmlsbD0iIzE2MWIyMiIvPjxwYXRoIGQ9Ik0yLjUgNS41TDYuNSA4IDIuNSAxMC41IiBzdHJva2U9IiMzZmI5NTAiIHN0cm9rZS13aWR0aD0iMS41IiBmaWxsPSJub25lIiBzdHJva2UtbGluZWNhcD0icm91bmQiIHN0cm9rZS1saW5lam9pbj0icm91bmQiLz48bGluZSB4MT0iOC41IiB5MT0iMTAuNSIgeDI9IjEzLjUiIHkyPSIxMC41IiBzdHJva2U9IiMzZmI5NTAiIHN0cm9rZS13aWR0aD0iMS41IiBzdHJva2UtbGluZWNhcD0icm91bmQiLz48L3N2Zz4=" />
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/xterm@5.3.0/css/xterm.css" />
  <script src="https://cdn.jsdelivr.net/npm/xterm@5.3.0/lib/xterm.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/xterm-addon-fit@0.8.0/lib/xterm-addon-fit.js"></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:          #0a0e14;
      --bg-card:     #131920;
      --bg-card-hover: #1a2230;
      --bg-input:    #0d1117;
      --bg-modal:    #131920;
      --border:      #1e2a3a;
      --border-hover:#2d4a6a;
      --text:        #e6edf3;
      --text-muted:  #6b7b8d;
      --accent:      #58a6ff;
      --accent-hover:#79c0ff;
      --accent-glow: rgba(88, 166, 255, 0.15);
      --btn-primary: #238636;
      --btn-primary-hover: #2ea043;
      --btn-danger:  #da3633;
      --btn-danger-hover: #f85149;
      --btn-neutral: #1c2433;
      --btn-neutral-hover: #253040;
      --badge-creating:  #6e7681;
      --badge-starting:  #d29922;
      --badge-running:   #3fb950;
      --badge-stopping:  #e3b341;
      --badge-stopped:   #484f58;
      --badge-failed:    #f85149;
    }

    html, body {
      height: 100%;
      background: var(--bg);
      color: var(--text);
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Helvetica, Arial, sans-serif;
      font-size: 14px;
      line-height: 1.5;
    }

    a { color: var(--accent); text-decoration: none; }
    a:hover { color: var(--accent-hover); text-decoration: underline; }

    /* ── Layout ── */
    #app { height: 100%; display: flex; flex-direction: column; }

    /* ── Views ── */
    .view { display: none; flex: 1; flex-direction: column; }
    .view.active { display: flex; }

    /* ── Login ── */
    #login-overlay {
      display: none;
      position: fixed;
      inset: 0;
      background: var(--bg);
      z-index: 300;
      align-items: center;
      justify-content: center;
      flex-direction: column;
      gap: 32px;
    }

    .login-brand {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 12px;
    }

    .login-logo {
      width: 56px;
      height: 56px;
      background: linear-gradient(135deg, #238636 0%, #58a6ff 100%);
      border-radius: 14px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 28px;
      font-weight: 700;
      color: #fff;
      font-family: ui-monospace, monospace;
      box-shadow: 0 0 40px rgba(88, 166, 255, 0.2), 0 0 80px rgba(35, 134, 54, 0.1);
    }

    .login-title {
      font-size: 24px;
      font-weight: 700;
      letter-spacing: -0.02em;
      background: linear-gradient(135deg, #e6edf3 0%, #8b949e 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }

    .login-subtitle {
      color: var(--text-muted);
      font-size: 14px;
    }

    .login-card {
      background: var(--bg-card);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 32px;
      width: 100%;
      max-width: 380px;
      display: flex;
      flex-direction: column;
      gap: 20px;
      box-shadow: 0 8px 32px rgba(0,0,0,0.4);
    }

    /* ── Dashboard ── */
    #dashboard-view { overflow-y: auto; }

    .topbar {
      position: sticky;
      top: 0;
      z-index: 10;
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 12px 24px;
      background: rgba(19, 25, 32, 0.85);
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
      border-bottom: 1px solid var(--border);
    }

    .topbar-title {
      font-size: 18px;
      font-weight: 700;
      color: var(--text);
      letter-spacing: -0.02em;
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .topbar-logo {
      width: 28px;
      height: 28px;
      background: linear-gradient(135deg, #238636 0%, #58a6ff 100%);
      border-radius: 7px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 14px;
      font-weight: 700;
      color: #fff;
      font-family: ui-monospace, monospace;
    }

    .content {
      max-width: 960px;
      margin: 0 auto;
      width: 100%;
      padding: 24px 16px;
    }

    /* ── Buttons ── */
    .btn {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      padding: 7px 16px;
      border: 1px solid var(--border);
      border-radius: 8px;
      font-size: 13px;
      font-weight: 500;
      cursor: pointer;
      transition: all 0.15s ease;
      white-space: nowrap;
      background: var(--btn-neutral);
      color: var(--text);
    }
    .btn:hover { background: var(--btn-neutral-hover); border-color: var(--border-hover); }

    .btn-primary {
      background: var(--btn-primary);
      border-color: transparent;
      color: #fff;
    }
    .btn-primary:hover { background: var(--btn-primary-hover); border-color: transparent; box-shadow: 0 0 20px rgba(35, 134, 54, 0.3); }

    .btn-danger {
      background: transparent;
      border-color: var(--border);
      color: var(--btn-danger);
    }
    .btn-danger:hover { background: var(--btn-danger); border-color: var(--btn-danger); color: #fff; }

    .btn-sm {
      padding: 5px 12px;
      font-size: 12px;
    }

    .btn:disabled { opacity: 0.4; cursor: not-allowed; }

    /* ── Session cards ── */
    .sessions-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 20px;
    }

    .sessions-header h2 {
      font-size: 15px;
      font-weight: 600;
      color: var(--text-muted);
      text-transform: uppercase;
      letter-spacing: 0.05em;
    }

    .capacity-card {
      background: var(--bg-card);
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 16px 20px;
      margin-bottom: 16px;
      display: flex;
      flex-direction: column;
      gap: 12px;
    }

    .capacity-title {
      font-size: 12px;
      font-weight: 600;
      color: var(--text-muted);
      text-transform: uppercase;
      letter-spacing: 0.05em;
    }

    .capacity-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(170px, 1fr));
      gap: 10px;
    }

    .capacity-metric {
      background: var(--bg-input);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 10px 12px;
      display: flex;
      flex-direction: column;
      gap: 4px;
    }

    .capacity-metric-label {
      color: var(--text-muted);
      font-size: 11px;
      text-transform: uppercase;
      letter-spacing: 0.05em;
    }

    .capacity-metric-value {
      color: var(--text);
      font-size: 18px;
      font-weight: 700;
      letter-spacing: -0.02em;
    }

    .capacity-metric-subtle {
      color: var(--text-muted);
      font-size: 12px;
      font-family: ui-monospace, "SFMono-Regular", Menlo, monospace;
    }

    .session-list {
      display: flex;
      flex-direction: column;
      gap: 10px;
    }

    .session-card {
      background: var(--bg-card);
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 16px 20px;
      display: flex;
      flex-direction: column;
      gap: 10px;
      transition: all 0.2s ease;
      cursor: pointer;
    }
    .session-card:hover {
      background: var(--bg-card-hover);
      border-color: var(--border-hover);
      box-shadow: 0 4px 24px rgba(0,0,0,0.3);
      transform: translateY(-1px);
    }

    .session-card-top {
      display: flex;
      align-items: flex-start;
      justify-content: space-between;
      gap: 12px;
      flex-wrap: wrap;
    }

    .session-name {
      font-size: 15px;
      font-weight: 600;
      color: var(--text);
      display: flex;
      align-items: center;
      gap: 10px;
      flex-wrap: wrap;
    }

    /* Status indicator - dot style */
    .status-dot {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      font-size: 11px;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.05em;
    }

    .status-dot::before {
      content: '';
      width: 8px;
      height: 8px;
      border-radius: 50%;
      flex-shrink: 0;
    }

    .status-running { color: var(--badge-running); }
    .status-running::before { background: var(--badge-running); box-shadow: 0 0 8px var(--badge-running); }
    .status-creating { color: var(--badge-creating); }
    .status-creating::before { background: var(--badge-creating); }
    .status-starting { color: var(--badge-starting); }
    .status-starting::before { background: var(--badge-starting); }
    .status-stopping { color: var(--badge-stopping); }
    .status-stopping::before { background: var(--badge-stopping); }
    .status-stopped { color: var(--badge-stopped); }
    .status-stopped::before { background: var(--badge-stopped); }
    .status-failed { color: var(--badge-failed); }
    .status-failed::before { background: var(--badge-failed); }
    .status-unknown { color: var(--badge-stopped); }
    .status-unknown::before { background: var(--badge-stopped); }

    /* no animations */

    .session-actions {
      display: flex;
      gap: 6px;
      flex-wrap: wrap;
    }

    .session-meta {
      display: flex;
      flex-wrap: wrap;
      gap: 16px;
      color: var(--text-muted);
      font-size: 12px;
      font-family: ui-monospace, "SFMono-Regular", Menlo, monospace;
    }

    .session-meta span { display: flex; align-items: center; gap: 5px; }

    .session-repos {
      display: flex;
      flex-wrap: wrap;
      gap: 6px;
    }

    .repo-chip {
      background: rgba(88, 166, 255, 0.08);
      border: 1px solid rgba(88, 166, 255, 0.15);
      border-radius: 6px;
      padding: 2px 10px;
      font-size: 11px;
      color: var(--accent);
      font-family: ui-monospace, "SFMono-Regular", Menlo, monospace;
    }

    .empty-state {
      text-align: center;
      padding: 80px 20px;
      color: var(--text-muted);
    }

    .empty-state-icon {
      font-size: 48px;
      margin-bottom: 16px;
      opacity: 0.3;
    }

    .empty-state p { margin-bottom: 20px; font-size: 15px; }

    /* ── Modal ── */
    .modal-backdrop {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.75);
      backdrop-filter: blur(4px);
      -webkit-backdrop-filter: blur(4px);
      z-index: 100;
      align-items: center;
      justify-content: center;
      padding: 16px;
    }
    .modal-backdrop.open { display: flex; }

    .modal {
      background: var(--bg-modal);
      border: 1px solid var(--border);
      border-radius: 12px;
      width: 100%;
      max-width: 480px;
      padding: 28px;
      display: flex;
      flex-direction: column;
      gap: 16px;
      max-height: 90vh;
      overflow-y: auto;
      box-shadow: 0 16px 48px rgba(0,0,0,0.5);
    }

    .modal-title {
      font-size: 18px;
      font-weight: 700;
      letter-spacing: -0.02em;
    }

    .form-group {
      display: flex;
      flex-direction: column;
      gap: 6px;
    }

    .form-group label {
      font-size: 12px;
      font-weight: 600;
      color: var(--text-muted);
      text-transform: uppercase;
      letter-spacing: 0.04em;
    }

    .form-group input,
    .form-group textarea,
    .form-group select {
      background: var(--bg-input);
      border: 1px solid var(--border);
      border-radius: 8px;
      color: var(--text);
      font-size: 14px;
      padding: 10px 12px;
      width: 100%;
      transition: all 0.15s ease;
      font-family: inherit;
    }

    .form-group input:focus,
    .form-group textarea:focus,
    .form-group select:focus {
      outline: none;
      border-color: var(--accent);
      box-shadow: 0 0 0 3px var(--accent-glow);
    }

    .form-group textarea {
      resize: vertical;
      min-height: 80px;
      font-family: ui-monospace, "SFMono-Regular", Menlo, monospace;
      font-size: 13px;
    }

    .form-group select option { background: var(--bg-card); }

    .form-row {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(140px, 1fr));
      gap: 12px;
    }

    .checkbox-group {
      display: flex;
      align-items: center;
      gap: 8px;
    }
    .checkbox-group input[type="checkbox"] {
      width: 16px;
      height: 16px;
      cursor: pointer;
      accent-color: var(--accent);
    }
    .checkbox-group label {
      text-transform: none !important;
      font-size: 13px !important;
      color: var(--text) !important;
      font-weight: 400 !important;
      letter-spacing: normal !important;
    }

    .modal-actions {
      display: flex;
      justify-content: flex-end;
      gap: 8px;
      margin-top: 8px;
    }

    .form-error {
      color: var(--badge-failed);
      font-size: 12px;
      min-height: 18px;
    }

    /* ── Terminal view ── */
    #terminal-view {
      height: 100%;
      overflow: hidden;
    }

    .terminal-topbar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 8px 16px;
      background: rgba(19, 25, 32, 0.9);
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
      border-bottom: 1px solid var(--border);
      flex-shrink: 0;
      gap: 12px;
      flex-wrap: wrap;
    }

    .terminal-topbar-left {
      display: flex;
      align-items: center;
      gap: 12px;
    }

    .terminal-session-name {
      font-weight: 600;
      font-size: 14px;
      font-family: ui-monospace, "SFMono-Regular", Menlo, monospace;
    }

    .terminal-status {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      font-size: 11px;
      color: var(--text-muted);
    }

    .terminal-status-dot {
      width: 7px;
      height: 7px;
      border-radius: 50%;
      background: var(--badge-stopped);
      transition: background 0.3s ease, box-shadow 0.3s ease;
    }

    .terminal-status-dot.connected {
      background: var(--badge-running);
      box-shadow: 0 0 6px var(--badge-running);
    }

    .terminal-status-dot.connecting {
      background: var(--badge-starting);
      /* no animation */
    }

    #terminal-container {
      flex: 1;
      overflow: auto;
      background: #0a0e14;
    }

    #terminal-container .xterm {
      height: 100%;
      padding: 4px 0 0 4px;
    }

    #terminal-container .xterm-viewport {
      overflow-y: auto !important;
      overscroll-behavior: contain;
    }

    /* ── Spinner ── */
    .spinner {
      color: var(--text-muted);
      font-size: 13px;
    }

    /* ── Toasts ── */
    #toast-container {
      position: fixed;
      bottom: 20px;
      right: 20px;
      z-index: 200;
      display: flex;
      flex-direction: column;
      gap: 8px;
      pointer-events: none;
    }

    .toast {
      background: var(--bg-card);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 12px 16px;
      font-size: 13px;
      color: var(--text);
      box-shadow: 0 8px 24px rgba(0,0,0,0.5);
      /* static */
      pointer-events: auto;
      max-width: 320px;
      backdrop-filter: blur(8px);
    }
    .toast.error { border-color: var(--badge-failed); color: var(--badge-failed); }
    .toast.success { border-color: var(--badge-running); }

    /* no toast animation */

    /* ── Responsive ── */
    @media (max-width: 600px) {
      .topbar { padding: 10px 12px; }
      .content { padding: 16px 12px; }
      .session-card { padding: 14px; }
      .form-row { grid-template-columns: 1fr; }
      .modal { padding: 20px; }
      .login-card { margin: 0 16px; }
    }
  </style>
</head>
<body>
<!-- Login Overlay -->
<div id="login-overlay">
  <div class="login-brand">
    <div class="login-logo">&gt;_</div>
    <div class="login-title">Imparando</div>
    <div class="login-subtitle">Cloud development environments</div>
  </div>
  <div class="login-card">
    <form id="login-form" autocomplete="on" style="display:flex;flex-direction:column;gap:14px;">
      <div class="form-group">
        <label for="login-username">Username</label>
        <input type="text" id="login-username" name="username" autocomplete="username" required />
      </div>
      <div class="form-group">
        <label for="login-password">Password</label>
        <input type="password" id="login-password" name="password" autocomplete="current-password" required />
      </div>
      <div class="form-error" id="login-error"></div>
      <button type="submit" class="btn btn-primary" style="width:100%;justify-content:center;padding:10px;">Login</button>
    </form>
  </div>
</div>

<div id="app">

  <!-- Dashboard View -->
  <div id="dashboard-view" class="view">
    <div class="topbar">
      <span class="topbar-title">
        <span class="topbar-logo">&gt;_</span>
        Imparando
      </span>
      <div style="display:flex;gap:8px;align-items:center;">
        <button class="btn btn-primary" id="new-session-btn">+ New Session</button>
        <button class="btn" id="logout-btn">Logout</button>
      </div>
    </div>
    <div class="content">
      <div class="sessions-header">
        <h2>Sessions</h2>
        <span id="refresh-indicator" style="color:var(--text-muted);font-size:12px;"></span>
      </div>
      <div class="capacity-card" id="capacity-card">
        <div class="capacity-title">Host Budget</div>
        <div class="capacity-grid" id="capacity-grid"></div>
      </div>
      <div id="session-list" class="session-list">
        <div class="empty-state">
          <div class="spinner">Loading...</div>
        </div>
      </div>
    </div>
  </div>

  <!-- Terminal View -->
  <div id="terminal-view" class="view">
    <div class="terminal-topbar">
      <div class="terminal-topbar-left">
        <a href="#/" class="btn btn-sm" id="back-btn">&#8592; Back</a>
        <span class="terminal-session-name" id="terminal-session-name">Session</span>
        <span class="terminal-status">
          <span class="terminal-status-dot" id="terminal-status-dot"></span>
          <span id="terminal-status-text">Connecting</span>
        </span>
      </div>
      <button class="btn btn-sm btn-danger" id="terminal-stop-btn">Delete</button>
    </div>
    <div id="terminal-container"></div>
  </div>

</div>

<!-- New Session Modal -->
<div class="modal-backdrop" id="new-session-modal">
  <div class="modal" role="dialog" aria-modal="true" aria-labelledby="modal-title">
    <div class="modal-title" id="modal-title">New Session</div>
    <form id="new-session-form" autocomplete="off">
      <div style="display:flex;flex-direction:column;gap:14px;">
        <div class="form-group">
          <label for="f-name">Session Name</label>
          <input type="text" id="f-name" placeholder="my-session" required />
        </div>
        <div class="form-group">
          <label for="f-repos">Repositories <span style="font-weight:400;text-transform:none;">(one per line)</span></label>
          <textarea id="f-repos" placeholder="https://github.com/user/repo"></textarea>
        </div>
        <div class="form-row">
          <div class="form-group">
            <label for="f-agent">Agent</label>
            <select id="f-agent">
              <option value="claude" selected>Claude</option>
              <option value="codex">Codex</option>
            </select>
          </div>
          <div class="form-group">
            <label for="f-vcpus">vCPUs</label>
            <select id="f-vcpus">
              <option value="1">1</option>
              <option value="2" selected>2</option>
              <option value="4">4</option>
            </select>
          </div>
          <div class="form-group">
            <label for="f-memory">Memory (MB)</label>
            <select id="f-memory">
              <option value="512">512 MB</option>
              <option value="1024">1024 MB</option>
              <option value="2048" selected>2048 MB</option>
              <option value="4096">4096 MB</option>
              <option value="8192">8192 MB</option>
            </select>
          </div>
        </div>
        <div class="form-group">
          <div class="checkbox-group">
            <input type="checkbox" id="f-private-repos" />
            <label for="f-private-repos">Clone private repositories</label>
          </div>
        </div>
        <div class="form-group">
          <label>Capacity</label>
          <div id="capacity-hint" style="color:var(--text-muted);font-size:12px;font-family:ui-monospace, 'SFMono-Regular', Menlo, monospace;"></div>
        </div>
        <div class="form-error" id="form-error"></div>
        <div class="modal-actions">
          <button type="button" class="btn" id="modal-cancel-btn">Cancel</button>
          <button type="submit" class="btn btn-primary" id="modal-submit-btn">Create Session</button>
        </div>
      </div>
    </form>
  </div>
</div>

<!-- Toast container -->
<div id="toast-container"></div>

<script>
(function () {
  'use strict';

  // ── State ──────────────────────────────────────────────────────────────
  let sessions = [];
  let capacity = null;
  let refreshTimer = null;
  let currentSessionId = null;
  let term = null;
  let fitAddon = null;
  let ws = null;
  let resizeObserver = null;

  // ── Login / Logout ─────────────────────────────────────────────────────
  document.getElementById('login-form').addEventListener('submit', async function (e) {
    e.preventDefault();
    const user = document.getElementById('login-username').value;
    const pass = document.getElementById('login-password').value;
    if (!user || !pass) return;

    const b64 = btoa(user + ':' + pass);
    const errEl = document.getElementById('login-error');
    const btn = this.querySelector('button[type="submit"]');
    btn.disabled = true;
    btn.textContent = 'Logging in\u2026';
    errEl.textContent = '';

    try {
      const res = await fetch('/api/sessions', { headers: { 'Authorization': 'Basic ' + b64 } });
      if (res.status === 401) {
        errEl.textContent = 'Invalid username or password.';
        return;
      }
      sessionStorage.setItem('imparando_creds', b64);
      document.getElementById('login-overlay').style.display = 'none';
      document.getElementById('app').style.display = '';
      onRouteChange();
    } catch (_) {
      errEl.textContent = 'Could not reach server.';
    } finally {
      btn.disabled = false;
      btn.textContent = 'Login';
    }
  });

  document.getElementById('logout-btn').addEventListener('click', function () {
    sessionStorage.removeItem('imparando_creds');
    showLoginOverlay();
  });

  function showLoginOverlay(msg) {
    stopAutoRefresh();
    teardownTerminal();
    document.getElementById('app').style.display = 'none';
    document.getElementById('login-overlay').style.display = 'flex';
    document.getElementById('login-error').textContent = msg || '';
  }

  // ── Toast ──────────────────────────────────────────────────────────────
  function showToast(msg, type) {
    type = type || '';
    const el = document.createElement('div');
    el.className = 'toast' + (type ? ' ' + type : '');
    el.textContent = msg;
    document.getElementById('toast-container').appendChild(el);
    setTimeout(function() { el.remove(); }, 3500);
  }

  // ── Routing ────────────────────────────────────────────────────────────
  function getRoute() {
    const hash = location.hash || '#/';
    const sessionMatch = hash.match(/^#\/session\/([0-9a-f-]+)$/i);
    if (sessionMatch) return { view: 'session', id: sessionMatch[1] };
    return { view: 'dashboard' };
  }

  function navigate(path) {
    location.hash = path;
  }

  window.addEventListener('hashchange', onRouteChange);

  function onRouteChange() {
    const route = getRoute();
    if (route.view === 'session') {
      showTerminalView(route.id);
    } else {
      showDashboardView();
    }
  }

  // ── View switching ─────────────────────────────────────────────────────
  function showDashboardView() {
    document.getElementById('dashboard-view').classList.add('active');
    document.getElementById('terminal-view').classList.remove('active');
    teardownTerminal();
    startAutoRefresh();
    loadSessions();
  }

  function showTerminalView(sessionId) {
    document.getElementById('terminal-view').classList.add('active');
    document.getElementById('dashboard-view').classList.remove('active');
    stopAutoRefresh();

    currentSessionId = sessionId;

    var session = sessions.find(function(s) { return s.id === sessionId; });
    document.getElementById('terminal-session-name').textContent =
      session ? session.name : sessionId;

    document.getElementById('terminal-stop-btn').onclick = async function() {
      if (!confirm('Delete this session? This cannot be undone.')) return;
      try {
        await apiFetch('/api/sessions/' + sessionId, { method: 'DELETE' });
        navigate('#/');
      } catch (e) {
        showToast('Failed to delete session: ' + e.message, 'error');
      }
    };

    setupTerminal(sessionId);
  }

  // ── Auth helpers ───────────────────────────────────────────────────────
  function getAuthHeader() {
    return 'Basic ' + sessionStorage.getItem('imparando_creds');
  }

  function handleUnauthorized() {
    showLoginOverlay('Session expired. Please log in again.');
  }

  // ── API helpers ────────────────────────────────────────────────────────
  async function apiFetch(path, opts) {
    opts = opts || {};
    var res = await fetch(path, {
      headers: Object.assign({
        'Content-Type': 'application/json',
        'Authorization': getAuthHeader(),
      }, opts.headers || {}),
      method: opts.method,
      body: opts.body,
    });
    if (res.status === 401) {
      handleUnauthorized();
      throw new Error('Unauthorized');
    }
    if (!res.ok) {
      var msg = 'HTTP ' + res.status;
      try { var j = await res.json(); msg = j.error || j.message || msg; } catch (_) {}
      throw new Error(msg);
    }
    var ct = res.headers.get('content-type') || '';
    if (ct.indexOf('application/json') >= 0) return res.json();
    return null;
  }

  // ── Sessions ───────────────────────────────────────────────────────────
  async function loadSessions() {
    try {
      sessions = await apiFetch('/api/sessions');
      capacity = await apiFetch('/api/capacity');
      renderSessions();
      renderCapacity();
    } catch (e) {
      document.getElementById('session-list').innerHTML =
        '<div class="empty-state" style="color:var(--badge-failed)">Failed to load sessions: ' + escHtml(e.message) + '</div>';
    }
  }

  function startAutoRefresh() {
    stopAutoRefresh();
    refreshTimer = setInterval(function() {
      var indicator = document.getElementById('refresh-indicator');
      if (indicator) indicator.textContent = '';
      loadSessions();
    }, 5000);
  }

  function stopAutoRefresh() {
    if (refreshTimer) { clearInterval(refreshTimer); refreshTimer = null; }
  }

  function escHtml(str) {
    return String(str)
      .replace(/&/g, '&amp;')
      .replace(/</g, '&lt;')
      .replace(/>/g, '&gt;')
      .replace(/"/g, '&quot;');
  }

  function statusClass(status) {
    var valid = ['creating','starting','running','stopping','stopped','failed'];
    return valid.indexOf(status) >= 0 ? 'status-' + status : 'status-unknown';
  }

  function formatUptime(createdAt) {
    if (!createdAt) return '';
    var diffMs = Date.now() - new Date(createdAt).getTime();
    if (isNaN(diffMs) || diffMs < 0) return '';
    var totalSec = Math.floor(diffMs / 1000);
    var d = Math.floor(totalSec / 86400);
    var h = Math.floor((totalSec % 86400) / 3600);
    var m = Math.floor((totalSec % 3600) / 60);
    var s = totalSec % 60;
    if (d > 0) return d + 'd ' + h + 'h';
    if (h > 0) return h + 'h ' + m + 'm';
    if (m > 0) return m + 'm ' + s + 's';
    return s + 's';
  }

  function formatMemoryMb(memoryMb) {
    if (memoryMb >= 1024) {
      var gib = memoryMb / 1024;
      return (Math.round(gib * 10) / 10) + ' GiB';
    }
    return memoryMb + ' MiB';
  }

  function renderCapacity() {
    var grid = document.getElementById('capacity-grid');
    var hint = document.getElementById('capacity-hint');
    if (!grid || !hint || !capacity) {
      return;
    }

    var remainingSessions = Math.max(0, capacity.max_sessions - capacity.active_sessions);
    var remainingVcpus = Math.max(0, capacity.max_total_vcpus - capacity.used_vcpus);
    var remainingMemoryMb = Math.max(0, capacity.max_total_memory_mb - capacity.used_memory_mb);

    grid.innerHTML =
      '<div class="capacity-metric">' +
      '<div class="capacity-metric-label">Sessions</div>' +
      '<div class="capacity-metric-value">' + escHtml(String(capacity.active_sessions)) + ' / ' + escHtml(String(capacity.max_sessions)) + '</div>' +
      '<div class="capacity-metric-subtle">' + escHtml(String(remainingSessions)) + ' free</div>' +
      '</div>' +
      '<div class="capacity-metric">' +
      '<div class="capacity-metric-label">vCPU</div>' +
      '<div class="capacity-metric-value">' + escHtml(String(capacity.used_vcpus)) + ' / ' + escHtml(String(capacity.max_total_vcpus)) + '</div>' +
      '<div class="capacity-metric-subtle">' + escHtml(String(remainingVcpus)) + ' free</div>' +
      '</div>' +
      '<div class="capacity-metric">' +
      '<div class="capacity-metric-label">Memory</div>' +
      '<div class="capacity-metric-value">' + escHtml(formatMemoryMb(capacity.used_memory_mb)) + '</div>' +
      '<div class="capacity-metric-subtle">' + escHtml(formatMemoryMb(remainingMemoryMb)) + ' free of ' + escHtml(formatMemoryMb(capacity.max_total_memory_mb)) + '</div>' +
      '</div>';

    hint.textContent =
      remainingVcpus + ' vCPU free, ' +
      formatMemoryMb(remainingMemoryMb) + ' free, ' +
      remainingSessions + ' session slots free.';
  }

  function renderSessions() {
    var container = document.getElementById('session-list');
    if (!sessions || sessions.length === 0) {
      container.innerHTML =
        '<div class="empty-state">' +
        '<div class="empty-state-icon">&gt;_</div>' +
        '<p>No sessions yet. Spin up a cloud environment to get started.</p>' +
        '<button class="btn btn-primary" onclick="document.getElementById(\'new-session-btn\').click()">Create Session</button>' +
        '</div>';
      return;
    }

    container.innerHTML = sessions.map(function(s) {
      var repos = Array.isArray(s.repos) ? s.repos : [];
      var repoChips = repos.map(function(r) {
        return '<span class="repo-chip">' + escHtml(r.replace(/^https?:\/\/(www\.)?github\.com\//, '')) + '</span>';
      }).join('');

      var canOpen = s.status === 'running';
      var agent = s.agent === 'codex' ? 'Codex' : 'Claude';

      return '<div class="session-card" data-id="' + escHtml(s.id) + '"' +
        (canOpen ? ' onclick="openSession(\'' + escHtml(s.id) + '\')"' : '') + '>' +
        '<div class="session-card-top">' +
        '<div class="session-name">' +
        escHtml(s.name) +
        ' <span class="status-dot ' + statusClass(s.status) + '">' + escHtml(s.status || 'unknown') + '</span>' +
        '</div>' +
        '<div class="session-actions">' +
        '<button class="btn btn-sm" onclick="event.stopPropagation();openSession(\'' + escHtml(s.id) + '\')"' +
        (canOpen ? '' : ' disabled') + '>Open</button>' +
        '<button class="btn btn-sm btn-danger" onclick="event.stopPropagation();deleteSession(\'' + escHtml(s.id) + '\')">Delete</button>' +
        '</div></div>' +
        '<div class="session-meta">' +
        '<span>' + escHtml(agent) + '</span>' +
        '<span>' + escHtml(String(s.vcpus || '?')) + ' vCPU</span>' +
        '<span>' + escHtml(String(s.memory_mb || '?')) + ' MB RAM</span>' +
        (s.created_at ? '<span>' + escHtml(formatUptime(s.created_at)) + ' uptime</span>' : '') +
        '</div>' +
        (repos.length > 0 ? '<div class="session-repos">' + repoChips + '</div>' : '') +
        '</div>';
    }).join('');
  }

  // ── Session actions ────────────────────────────────────────────────────
  window.openSession = function (id) {
    navigate('#/session/' + id);
  };

  window.stopSession = async function (id) {
    try {
      await apiFetch('/api/sessions/' + id + '/stop', { method: 'PUT' });
      showToast('Session stop requested.', 'success');
      await loadSessions();
    } catch (e) {
      showToast('Failed to stop session: ' + e.message, 'error');
    }
  };

  window.deleteSession = async function (id) {
    if (!confirm('Delete this session? This cannot be undone.')) return;
    try {
      await apiFetch('/api/sessions/' + id, { method: 'DELETE' });
      showToast('Session deleted.', 'success');
      await loadSessions();
    } catch (e) {
      showToast('Failed to delete session: ' + e.message, 'error');
    }
  };

  // ── New Session modal ──────────────────────────────────────────────────
  document.getElementById('new-session-btn').addEventListener('click', openModal);
  document.getElementById('modal-cancel-btn').addEventListener('click', closeModal);
  document.getElementById('new-session-modal').addEventListener('click', function (e) {
    if (e.target === this) closeModal();
  });

  function openModal() {
    document.getElementById('new-session-form').reset();
    document.getElementById('form-error').textContent = '';
    document.getElementById('new-session-modal').classList.add('open');
    renderCapacity();
    document.getElementById('f-name').focus();
  }

  function closeModal() {
    document.getElementById('new-session-modal').classList.remove('open');
  }

  document.getElementById('new-session-form').addEventListener('submit', async function (e) {
    e.preventDefault();
    var errEl = document.getElementById('form-error');
    errEl.textContent = '';

    var name = document.getElementById('f-name').value.trim();
    var reposRaw = document.getElementById('f-repos').value.trim();
    var agent = document.getElementById('f-agent').value;
    var vcpus = parseInt(document.getElementById('f-vcpus').value, 10);
    var memory_mb = parseInt(document.getElementById('f-memory').value, 10);
    var private_repos = document.getElementById('f-private-repos').checked;

    if (!name) { errEl.textContent = 'Name is required.'; return; }

    var repos = reposRaw
      ? reposRaw.split('\n').map(function(r) { return r.trim(); }).filter(Boolean)
      : [];

    var submitBtn = document.getElementById('modal-submit-btn');
    submitBtn.disabled = true;
    submitBtn.textContent = 'Creating\u2026';

    try {
      await apiFetch('/api/sessions', {
        method: 'POST',
        body: JSON.stringify({ name: name, repos: repos, agent: agent, vcpus: vcpus, memory_mb: memory_mb, private_repos: private_repos }),
      });
      closeModal();
      showToast('Session created!', 'success');
      await loadSessions();
    } catch (e) {
      errEl.textContent = e.message;
    } finally {
      submitBtn.disabled = false;
      submitBtn.textContent = 'Create Session';
    }
  });

  // ── Terminal ───────────────────────────────────────────────────────────
  function setTerminalStatus(state) {
    var dot = document.getElementById('terminal-status-dot');
    var text = document.getElementById('terminal-status-text');
    dot.className = 'terminal-status-dot';
    if (state === 'connected') {
      dot.classList.add('connected');
      text.textContent = 'Connected';
    } else if (state === 'connecting') {
      dot.classList.add('connecting');
      text.textContent = 'Connecting';
    } else {
      text.textContent = 'Disconnected';
    }
  }

  function setupTerminal(sessionId) {
    teardownTerminal();

    var container = document.getElementById('terminal-container');
    container.innerHTML = '';
    setTerminalStatus('connecting');

    term = new Terminal({
      theme: {
        background: '#0a0e14',
        foreground: '#e6edf3',
        cursor:     '#58a6ff',
        cursorAccent: '#0a0e14',
        selectionBackground: 'rgba(88, 166, 255, 0.25)',
        selectionForeground: '#ffffff',
        black:   '#0a0e14',
        red:     '#f85149',
        green:   '#3fb950',
        yellow:  '#d29922',
        blue:    '#58a6ff',
        magenta: '#bc8cff',
        cyan:    '#39c5cf',
        white:   '#b1bac4',
        brightBlack:   '#6e7681',
        brightRed:     '#ff7b72',
        brightGreen:   '#56d364',
        brightYellow:  '#e3b341',
        brightBlue:    '#79c0ff',
        brightMagenta: '#d2a8ff',
        brightCyan:    '#56d4dd',
        brightWhite:   '#f0f6fc',
      },
      fontFamily: '"Berkeley Mono", "JetBrains Mono", ui-monospace, "SFMono-Regular", Menlo, Consolas, monospace',
      fontSize: 14,
      lineHeight: 1.3,
      cursorBlink: false,
      cursorStyle: 'bar',
      scrollback: 10000,
      scrollOnUserInput: true,
      scrollSensitivity: 3,
      fastScrollSensitivity: 5,
      allowTransparency: false,
    });

    fitAddon = new FitAddon.FitAddon();
    term.loadAddon(fitAddon);
    term.open(container);
    fitAddon.fit();
    if (term.attachCustomWheelEventHandler) {
      term.attachCustomWheelEventHandler(function() { return true; });
    }

    connectWebSocket(sessionId);

    resizeObserver = new ResizeObserver(function() {
      fitAddon.fit();
      sendResize();
    });
    resizeObserver.observe(container);

    term.onData(function(data) {
      if (ws && ws.readyState === WebSocket.OPEN) {
        var encoder = new TextEncoder();
        var encoded = encoder.encode(data);
        var msg = new Uint8Array(1 + encoded.length);
        msg[0] = 0x30; // '0' = INPUT
        msg.set(encoded, 1);
        ws.send(msg.buffer);
      }
    });
  }

  function connectWebSocket(sessionId) {
    var proto = location.protocol === 'https:' ? 'wss' : 'ws';
    var url = proto + '://' + location.host + '/api/sessions/' + sessionId + '/terminal';
    ws = new WebSocket(url);
    ws.binaryType = 'arraybuffer';

    ws.onopen = function() {
      setTerminalStatus('connected');
      sendResize();
    };

    ws.onmessage = function(event) {
      if (!(event.data instanceof ArrayBuffer)) return;
      var view = new Uint8Array(event.data);
      if (view.length === 0) return;
      if (view[0] === 0x30) { // OUTPUT
        term.write(view.slice(1));
      }
    };

    ws.onclose = function(event) {
      setTerminalStatus('disconnected');
      if (term) {
        term.write('\r\n\x1b[2m\x1b[38;5;245m--- connection closed (' + event.code + ') ---\x1b[0m\r\n');
      }
    };

    ws.onerror = function() {
      setTerminalStatus('disconnected');
      if (term) {
        term.write('\r\n\x1b[31m--- connection error ---\x1b[0m\r\n');
      }
    };
  }

  function sendResize() {
    if (!term || !ws || ws.readyState !== WebSocket.OPEN) return;
    var payload = JSON.stringify({ columns: term.cols, rows: term.rows });
    var encoder = new TextEncoder();
    var encoded = encoder.encode(payload);
    var msg = new Uint8Array(1 + encoded.length);
    msg[0] = 0x31; // '1' = RESIZE_TERMINAL
    msg.set(encoded, 1);
    ws.send(msg.buffer);
  }

  function teardownTerminal() {
    if (resizeObserver) { resizeObserver.disconnect(); resizeObserver = null; }
    if (ws) { ws.close(); ws = null; }
    if (term) { term.dispose(); term = null; }
    fitAddon = null;
    currentSessionId = null;
    document.getElementById('terminal-container').innerHTML = '';
  }

  // ── Back button ────────────────────────────────────────────────────────
  document.getElementById('back-btn').addEventListener('click', function(e) {
    e.preventDefault();
    navigate('#/');
  });

  // ── Keyboard shortcuts ─────────────────────────────────────────────────
  document.addEventListener('keydown', function(e) {
    if (e.key === 'Escape') {
      var modal = document.getElementById('new-session-modal');
      if (modal.classList.contains('open')) closeModal();
    }
  });

  // ── Boot ───────────────────────────────────────────────────────────────
  if (sessionStorage.getItem('imparando_creds')) {
    document.getElementById('login-overlay').style.display = 'none';
    onRouteChange();
  } else {
    document.getElementById('app').style.display = 'none';
    document.getElementById('login-overlay').style.display = 'flex';
  }

})();
</script>
</body>
</html>

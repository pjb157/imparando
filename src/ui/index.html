<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Imparando</title>
  <link rel="icon" type="image/svg+xml" href="data:image/svg+xml;base64,PHN2ZyB4bWxucz0iaHR0cDovL3d3dy53My5vcmcvMjAwMC9zdmciIHZpZXdCb3g9IjAgMCAxNiAxNiI+PHJlY3Qgd2lkdGg9IjE2IiBoZWlnaHQ9IjE2IiByeD0iMyIgZmlsbD0iIzE2MWIyMiIvPjxwYXRoIGQ9Ik0yLjUgNS41TDYuNSA4IDIuNSAxMC41IiBzdHJva2U9IiMzZmI5NTAiIHN0cm9rZS13aWR0aD0iMS41IiBmaWxsPSJub25lIiBzdHJva2UtbGluZWNhcD0icm91bmQiIHN0cm9rZS1saW5lam9pbj0icm91bmQiLz48bGluZSB4MT0iOC41IiB5MT0iMTAuNSIgeDI9IjEzLjUiIHkyPSIxMC41IiBzdHJva2U9IiMzZmI5NTAiIHN0cm9rZS13aWR0aD0iMS41IiBzdHJva2UtbGluZWNhcD0icm91bmQiLz48L3N2Zz4=" />
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/xterm@5.3.0/css/xterm.css" />
  <link rel="stylesheet" href="https://unpkg.com/@phosphor-icons/web@2.1.1/src/regular/style.css" />
  <script src="https://cdn.jsdelivr.net/npm/xterm@5.3.0/lib/xterm.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/xterm-addon-fit@0.8.0/lib/xterm-addon-fit.js"></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #f3f6fb;
      --bg-card: #ffffff;
      --bg-card-hover: #fbfcfe;
      --bg-input: #f8fafc;
      --bg-modal: #ffffff;
      --border: rgba(15, 23, 42, 0.08);
      --border-strong: rgba(15, 23, 42, 0.14);
      --border-hover: rgba(14, 116, 144, 0.24);
      --text: #0f172a;
      --text-muted: #64748b;
      --text-faint: #94a3b8;
      --accent: #0f766e;
      --accent-hover: #115e59;
      --accent-glow: rgba(15, 118, 110, 0.12);
      --btn-primary: #0f766e;
      --btn-primary-hover: #115e59;
      --btn-primary-text: #ffffff;
      --btn-danger: #dc2626;
      --btn-danger-hover: #b91c1c;
      --btn-neutral: #ffffff;
      --btn-neutral-hover: #f8fafc;
      --badge-creating: #64748b;
      --badge-starting: #b45309;
      --badge-running: #15803d;
      --badge-stopping: #b45309;
      --badge-stopped: #64748b;
      --badge-failed: #dc2626;
      --shadow-sm: 0 1px 2px rgba(15, 23, 42, 0.04);
      --terminal-surface: #0f172a;
      --terminal-border: rgba(148, 163, 184, 0.18);
      --terminal-text: #e2e8f0;
      --terminal-muted: #94a3b8;
    }

    html[data-theme="dark"] {
      --bg: #0b1020;
      --bg-card: #111827;
      --bg-card-hover: #131c2c;
      --bg-input: #0f172a;
      --bg-modal: #111827;
      --border: rgba(148, 163, 184, 0.14);
      --border-strong: rgba(148, 163, 184, 0.24);
      --border-hover: rgba(45, 212, 191, 0.3);
      --text: #e5edf7;
      --text-muted: #93a4ba;
      --text-faint: #64748b;
      --accent: #5eead4;
      --accent-hover: #99f6e4;
      --accent-glow: rgba(94, 234, 212, 0.18);
      --btn-primary: #5eead4;
      --btn-primary-hover: #99f6e4;
      --btn-primary-text: #0f172a;
      --btn-danger: #f87171;
      --btn-danger-hover: #fca5a5;
      --btn-neutral: #111827;
      --btn-neutral-hover: #162033;
      --badge-creating: #94a3b8;
      --badge-starting: #f59e0b;
      --badge-running: #4ade80;
      --badge-stopping: #f59e0b;
      --badge-stopped: #64748b;
      --badge-failed: #f87171;
      --shadow-sm: none;
    }

    html, body {
      height: 100%;
      background: var(--bg);
      color: var(--text);
      font-family: ui-sans-serif, -apple-system, BlinkMacSystemFont, "Segoe UI", Helvetica, Arial, sans-serif;
      font-size: 14px;
      line-height: 1.5;
    }

    a { color: var(--accent); text-decoration: none; }
    a:hover { color: var(--accent-hover); text-decoration: underline; }

    /* ── Layout ── */
    #app { height: 100%; display: flex; flex-direction: column; }

    /* ── Views ── */
    .view { display: none; flex: 1; flex-direction: column; }
    .view.active { display: flex; }

    /* ── Login ── */
    #login-overlay {
      display: none;
      position: fixed;
      inset: 0;
      background: var(--bg);
      z-index: 300;
      align-items: center;
      justify-content: center;
      flex-direction: column;
      gap: 24px;
      padding: 24px;
    }

    .login-brand {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 12px;
    }

    .login-logo {
      width: 48px;
      height: 48px;
      background: var(--accent);
      border-radius: 10px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 24px;
      font-weight: 700;
      color: var(--btn-primary-text);
      font-family: ui-monospace, monospace;
      box-shadow: var(--shadow-sm);
    }

    .login-title {
      font-size: 22px;
      font-weight: 700;
      letter-spacing: -0.02em;
      color: var(--text);
    }

    .login-subtitle {
      color: var(--text-muted);
      font-size: 14px;
    }

    .login-card {
      background: var(--bg-card);
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 24px;
      width: 100%;
      max-width: 360px;
      display: flex;
      flex-direction: column;
      gap: 16px;
      box-shadow: var(--shadow-sm);
    }

    /* ── Dashboard ── */
    #dashboard-view { overflow-y: auto; }

    .topbar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 16px 24px;
      background: transparent;
      border-bottom: 1px solid var(--border);
    }

    .topbar-actions {
      display: flex;
      gap: 8px;
      align-items: center;
    }

    .theme-toggle {
      min-width: 68px;
      justify-content: center;
      font-family: ui-monospace, "SFMono-Regular", Menlo, monospace;
      text-transform: uppercase;
      letter-spacing: 0.06em;
    }

    .topbar-title {
      font-size: 14px;
      font-weight: 600;
      color: var(--text);
      letter-spacing: -0.01em;
      display: flex;
      align-items: center;
      gap: 12px;
    }

    .topbar-logo {
      width: 24px;
      height: 24px;
      background: var(--accent);
      border-radius: 6px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 12px;
      font-weight: 700;
      color: var(--btn-primary-text);
      font-family: ui-monospace, monospace;
    }

    .content {
      max-width: 1240px;
      margin: 0 auto;
      width: 100%;
      padding: 24px;
    }

    .metrics-layout {
      display: flex;
      flex-direction: column;
      gap: 10px;
      margin-bottom: 20px;
    }

    /* ── Buttons ── */
    .btn {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      padding: 8px 14px;
      border: 1px solid var(--border);
      border-radius: 8px;
      font-size: 12px;
      font-weight: 500;
      cursor: pointer;
      transition: all 0.15s ease;
      white-space: nowrap;
      background: var(--btn-neutral);
      color: var(--text);
      box-shadow: var(--shadow-sm);
    }
    .btn:hover { background: var(--btn-neutral-hover); border-color: var(--border); }

    .btn i {
      font-size: 14px;
      line-height: 1;
      flex-shrink: 0;
    }

    .btn-icon {
      width: 32px;
      height: 32px;
      padding: 0;
      justify-content: center;
      gap: 0;
    }

    .btn-primary {
      background: var(--btn-primary);
      border-color: var(--btn-primary);
      color: var(--btn-primary-text);
    }
    .btn-primary:hover { background: var(--btn-primary-hover); border-color: var(--btn-primary); }

    .btn-danger {
      background: transparent;
      border-color: transparent;
      color: var(--btn-danger);
    }
    .btn-danger:hover { background: transparent; border-color: transparent; color: var(--btn-danger-hover); }

    .btn-sm {
      padding: 5px 12px;
      font-size: 12px;
    }

    .btn:disabled { opacity: 0.4; cursor: not-allowed; }

    /* ── Session cards ── */
    .ledger-row {
      display: flex;
      justify-content: center;
      width: 100%;
    }

    .ledger-values {
      display: grid;
      grid-template-columns: repeat(var(--metric-columns, 4), minmax(0, 1fr));
      gap: 12px 24px;
      align-items: start;
      width: min(100%, 980px);
    }

    .ledger-item {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 2px;
      min-width: 0;
      text-align: center;
      position: relative;
    }

    .ledger-label {
      color: var(--text-muted);
      font-size: 12px;
      text-transform: uppercase;
      letter-spacing: 0.05em;
    }

    .ledger-value {
      color: var(--text);
      font-size: 20px;
      font-weight: 600;
      letter-spacing: -0.03em;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      font-variant-numeric: tabular-nums;
    }

    .ledger-subtle {
      display: none;
    }

    .ledger-item::after {
      content: attr(data-hint);
      position: absolute;
      left: 50%;
      bottom: calc(100% + 10px);
      transform: translateX(-50%);
      background: var(--bg-card);
      border: 1px solid var(--border-strong);
      border-radius: 8px;
      padding: 6px 8px;
      color: var(--text-muted);
      font-size: 11px;
      font-family: ui-monospace, "SFMono-Regular", Menlo, monospace;
      white-space: nowrap;
      box-shadow: var(--shadow-sm);
      opacity: 0;
      pointer-events: none;
      transition: opacity 150ms cubic-bezier(0.25, 1, 0.5, 1);
      z-index: 20;
    }

    .ledger-item:hover::after {
      opacity: 1;
    }


    .session-list {
      display: flex;
      flex-direction: column;
      gap: 8px;
    }

    .session-card {
      background: var(--bg-card);
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 14px 16px;
      display: flex;
      flex-direction: column;
      gap: 8px;
      transition: all 0.2s ease;
      cursor: pointer;
      box-shadow: var(--shadow-sm);
    }
    .session-card:hover {
      background: var(--bg-card-hover);
      border-color: var(--border-hover);
      transform: translateY(-1px);
    }

    .session-card-top {
      display: flex;
      align-items: flex-start;
      justify-content: space-between;
      gap: 12px;
      flex-wrap: wrap;
    }

    .session-name {
      font-size: 14px;
      font-weight: 600;
      color: var(--text);
      display: flex;
      align-items: center;
      gap: 10px;
      flex-wrap: wrap;
    }

    /* Status indicator - dot style */
    .status-dot {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      font-size: 11px;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.05em;
    }

    .status-dot::before {
      content: '';
      width: 8px;
      height: 8px;
      border-radius: 50%;
      flex-shrink: 0;
    }

    .status-running { color: var(--badge-running); }
    .status-running::before { background: var(--badge-running); }
    .status-creating { color: var(--badge-creating); }
    .status-creating::before { background: var(--badge-creating); }
    .status-starting { color: var(--badge-starting); }
    .status-starting::before { background: var(--badge-starting); }
    .status-stopping { color: var(--badge-stopping); }
    .status-stopping::before { background: var(--badge-stopping); }
    .status-stopped { color: var(--badge-stopped); }
    .status-stopped::before { background: var(--badge-stopped); }
    .status-failed { color: var(--badge-failed); }
    .status-failed::before { background: var(--badge-failed); }
    .status-unknown { color: var(--badge-stopped); }
    .status-unknown::before { background: var(--badge-stopped); }

    /* no animations */

    .session-actions {
      display: flex;
      gap: 6px;
      flex-wrap: wrap;
    }

    .session-actions .btn {
      box-shadow: none;
    }

    .session-meta {
      display: flex;
      flex-wrap: wrap;
      gap: 12px;
      color: var(--text-muted);
      font-size: 12px;
      font-family: ui-monospace, "SFMono-Regular", Menlo, monospace;
    }

    .session-meta span { display: flex; align-items: center; gap: 5px; }

    .session-repos {
      display: flex;
      flex-wrap: wrap;
      gap: 6px;
    }

    .repo-link {
      font-size: 11px;
      color: var(--text-muted);
      font-family: ui-monospace, "SFMono-Regular", Menlo, monospace;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .empty-state {
      text-align: center;
      padding: 64px 20px;
      color: var(--text-muted);
    }

    .empty-state-icon {
      font-size: 48px;
      margin-bottom: 16px;
      opacity: 0.3;
    }

    .empty-state p { margin-bottom: 20px; font-size: 15px; }

    /* ── Modal ── */
    .modal-backdrop {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(15, 23, 42, 0.24);
      backdrop-filter: blur(10px);
      -webkit-backdrop-filter: blur(10px);
      z-index: 100;
      align-items: center;
      justify-content: center;
      padding: 16px;
    }
    .modal-backdrop.open { display: flex; }

    .modal {
      background: var(--bg-modal);
      border: 1px solid var(--border);
      border-radius: 10px;
      width: 100%;
      max-width: 520px;
      padding: 20px;
      display: flex;
      flex-direction: column;
      gap: 12px;
      max-height: 90vh;
      overflow-y: auto;
      box-shadow: 0 24px 64px rgba(15, 23, 42, 0.16);
    }

    .modal-title {
      font-size: 18px;
      font-weight: 700;
      letter-spacing: -0.02em;
    }

    .form-group {
      display: flex;
      flex-direction: column;
      gap: 6px;
    }

    .form-group label {
      font-size: 12px;
      font-weight: 600;
      color: var(--text-muted);
      text-transform: uppercase;
      letter-spacing: 0.04em;
    }

    .form-group input,
    .form-group textarea,
    .form-group select {
      background: var(--bg-input);
      border: 1px solid var(--border);
      border-radius: 8px;
      color: var(--text);
      font-size: 14px;
      padding: 10px 12px;
      width: 100%;
      transition: all 0.15s ease;
      font-family: inherit;
    }

    .form-group input:focus,
    .form-group textarea:focus,
    .form-group select:focus {
      outline: none;
      border-color: var(--accent);
      box-shadow: 0 0 0 3px var(--accent-glow);
    }

    .form-group textarea {
      resize: vertical;
      min-height: 80px;
      font-family: ui-monospace, "SFMono-Regular", Menlo, monospace;
      font-size: 13px;
    }

    .form-group select option { background: var(--bg-card); }

    .form-row {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(140px, 1fr));
      gap: 12px;
    }

    .checkbox-group {
      display: flex;
      align-items: center;
      gap: 8px;
    }
    .checkbox-group input[type="checkbox"] {
      width: 16px;
      height: 16px;
      cursor: pointer;
      accent-color: var(--accent);
    }
    .checkbox-group label {
      text-transform: none !important;
      font-size: 13px !important;
      color: var(--text) !important;
      font-weight: 400 !important;
      letter-spacing: normal !important;
    }

    .modal-actions {
      display: flex;
      justify-content: flex-end;
      gap: 8px;
      margin-top: 8px;
    }

    .form-error {
      color: var(--badge-failed);
      font-size: 12px;
      min-height: 18px;
    }

    /* ── Terminal view ── */
    #terminal-view {
      height: 100%;
      overflow: hidden;
    }

    .terminal-topbar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 10px 16px;
      background: var(--terminal-surface);
      border-bottom: 1px solid var(--terminal-border);
      flex-shrink: 0;
      gap: 12px;
      flex-wrap: wrap;
    }

    .terminal-topbar-left {
      display: flex;
      align-items: center;
      gap: 12px;
    }

    .terminal-session-name {
      font-weight: 600;
      font-size: 14px;
      font-family: ui-monospace, "SFMono-Regular", Menlo, monospace;
      color: var(--terminal-text);
    }

    .terminal-status {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      font-size: 11px;
      color: var(--terminal-muted);
    }

    .terminal-status-dot {
      width: 7px;
      height: 7px;
      border-radius: 50%;
      background: var(--badge-stopped);
      transition: background 0.3s ease, box-shadow 0.3s ease;
    }

    .terminal-status-dot.connected {
      background: var(--badge-running);
      box-shadow: 0 0 6px var(--badge-running);
    }

    .terminal-status-dot.connecting {
      background: var(--badge-starting);
      /* no animation */
    }

    #terminal-container {
      flex: 1;
      overflow: auto;
      background: #0a0e14;
    }

    #terminal-container .xterm {
      height: 100%;
      padding: 4px 0 0 4px;
    }

    #terminal-container .xterm-viewport {
      overflow-y: auto !important;
      overscroll-behavior: contain;
    }

    /* ── Spinner ── */
    .spinner {
      color: var(--text-muted);
      font-size: 13px;
    }

    /* ── Toasts ── */
    #toast-container {
      position: fixed;
      bottom: 20px;
      right: 20px;
      z-index: 200;
      display: flex;
      flex-direction: column;
      gap: 8px;
      pointer-events: none;
    }

    .toast {
      background: var(--bg-card);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 12px 16px;
      font-size: 13px;
      color: var(--text);
      box-shadow: 0 12px 32px rgba(15, 23, 42, 0.14);
      /* static */
      pointer-events: auto;
      max-width: 320px;
      backdrop-filter: blur(8px);
    }
    .toast.error { border-color: var(--badge-failed); color: var(--badge-failed); }
    .toast.success { border-color: var(--badge-running); }

    /* no toast animation */

    /* ── Responsive ── */
    @media (max-width: 600px) {
      .topbar { padding: 12px; }
      .content { padding: 16px 12px; }
      .ledger-values { grid-template-columns: repeat(2, minmax(0, 1fr)); gap: 12px 14px; }
      .ledger-value { font-size: 16px; }
      .session-card { padding: 14px; }
      .form-row { grid-template-columns: 1fr; }
      .modal { padding: 20px; }
      .login-card { margin: 0 16px; }
    }
  </style>
</head>
<body>
<!-- Login Overlay -->
<div id="login-overlay">
  <div class="login-brand">
    <div class="login-logo">&gt;_</div>
    <div class="login-title">Imparando</div>
    <div class="login-subtitle">Cloud development environments</div>
  </div>
  <div class="login-card">
    <form id="login-form" autocomplete="on" style="display:flex;flex-direction:column;gap:14px;">
      <div class="form-group">
        <label for="login-username">Username</label>
        <input type="text" id="login-username" name="username" autocomplete="username" required />
      </div>
      <div class="form-group">
        <label for="login-password">Password</label>
        <input type="password" id="login-password" name="password" autocomplete="current-password" required />
      </div>
      <div class="form-error" id="login-error"></div>
      <button type="submit" class="btn btn-primary" style="width:100%;justify-content:center;padding:10px;">
        <i class="ph ph-sign-in"></i><span>Login</span>
      </button>
    </form>
  </div>
</div>

<div id="app">

  <!-- Dashboard View -->
  <div id="dashboard-view" class="view">
    <div class="topbar">
      <span class="topbar-title">
        <span class="topbar-logo">&gt;_</span>
        Imparando
      </span>
      <div class="topbar-actions">
        <button class="btn btn-icon theme-toggle" id="theme-toggle-btn" aria-label="Toggle theme" title="Toggle theme">
          <i class="ph ph-moon"></i>
        </button>
        <button class="btn" id="prompts-btn"><i class="ph ph-book-open-text"></i><span>Prompts</span></button>
        <button class="btn btn-primary" id="new-session-btn"><i class="ph ph-plus"></i><span>New Session</span></button>
        <button class="btn" id="logout-btn"><i class="ph ph-sign-out"></i><span>Logout</span></button>
      </div>
    </div>
    <div class="content">
      <div style="display:flex;justify-content:flex-end;margin-bottom:12px;">
        <span id="refresh-indicator" style="color:var(--text-muted);font-size:12px;font-family:ui-monospace, 'SFMono-Regular', Menlo, monospace;"></span>
      </div>
      <div class="metrics-layout">
        <div class="ledger-row">
          <div class="ledger-values" id="budget-grid" style="--metric-columns: 3;"></div>
        </div>
        <div class="ledger-row">
          <div class="ledger-values" id="node-metrics-grid" style="--metric-columns: 4;"></div>
        </div>
      </div>
      <div id="session-list" class="session-list">
        <div class="empty-state">
          <div class="spinner">Loading...</div>
        </div>
      </div>
    </div>
  </div>

  <!-- Terminal View -->
  <div id="terminal-view" class="view">
    <div class="terminal-topbar">
      <div class="terminal-topbar-left">
        <a href="#/" class="btn btn-sm" id="back-btn"><i class="ph ph-arrow-left"></i><span>Back</span></a>
        <span class="terminal-session-name" id="terminal-session-name">Session</span>
        <span class="terminal-status">
          <span class="terminal-status-dot" id="terminal-status-dot"></span>
          <span id="terminal-status-text">Connecting</span>
        </span>
      </div>
      <button class="btn btn-sm btn-danger" id="terminal-stop-btn"><i class="ph ph-trash"></i><span>Delete</span></button>
    </div>
    <div id="terminal-container"></div>
  </div>

</div>

<div class="modal-backdrop" id="new-session-modal">
  <div class="modal" role="dialog" aria-modal="true" aria-labelledby="modal-title">
    <div class="modal-title" id="modal-title">New Session</div>
    <form id="new-session-form" autocomplete="off">
      <div style="display:flex;flex-direction:column;gap:14px;">
        <div class="form-group">
          <label for="f-name">Session Name</label>
          <input type="text" id="f-name" placeholder="my-session" required />
        </div>
        <div class="form-group">
          <label for="f-repos">Repositories <span style="font-weight:400;text-transform:none;">(one per line)</span></label>
          <textarea id="f-repos" placeholder="https://github.com/user/repo"></textarea>
        </div>
        <div class="form-row">
          <div class="form-group">
            <label for="f-profile">Profile</label>
            <select id="f-profile"></select>
          </div>
          <div class="form-group">
            <label for="f-agent">Agent</label>
            <select id="f-agent">
              <option value="claude" selected>Claude</option>
              <option value="codex">Codex</option>
            </select>
          </div>
          <div class="form-group">
            <label for="f-vcpus">vCPUs</label>
            <select id="f-vcpus">
              <option value="1">1</option>
              <option value="2" selected>2</option>
              <option value="4">4</option>
            </select>
          </div>
          <div class="form-group">
            <label for="f-memory">Memory (MB)</label>
            <select id="f-memory">
              <option value="512">512 MB</option>
              <option value="1024">1024 MB</option>
              <option value="2048">2048 MB</option>
              <option value="4096" selected>4096 MB</option>
              <option value="8192">8192 MB</option>
            </select>
          </div>
        </div>
        <div class="form-group">
          <label>Profile Details</label>
          <div id="profile-hint" style="color:var(--text-muted);font-size:12px;font-family:ui-monospace, 'SFMono-Regular', Menlo, monospace;"></div>
        </div>
        <div class="form-group">
          <div class="checkbox-group">
            <input type="checkbox" id="f-private-repos" />
            <label for="f-private-repos">Clone private repositories</label>
          </div>
        </div>
        <div class="form-group">
          <label>Capacity</label>
          <div id="capacity-hint" style="color:var(--text-muted);font-size:12px;font-family:ui-monospace, 'SFMono-Regular', Menlo, monospace;"></div>
        </div>
        <div class="form-error" id="form-error"></div>
        <div class="modal-actions">
          <button type="button" class="btn" id="modal-cancel-btn"><i class="ph ph-x"></i><span>Cancel</span></button>
          <button type="submit" class="btn btn-primary" id="modal-submit-btn"><i class="ph ph-plus"></i><span>Create Session</span></button>
        </div>
      </div>
    </form>
  </div>
</div>

<!-- Prompt Modal -->
<div class="modal-backdrop" id="prompt-modal">
  <div class="modal" role="dialog" aria-modal="true" aria-labelledby="prompt-modal-title">
    <div class="modal-title" id="prompt-modal-title">Prompt References</div>
    <div id="prompt-list" style="display:flex;flex-direction:column;gap:12px;"></div>
    <div class="modal-actions" style="margin-top:16px;">
      <button type="button" class="btn" id="prompt-close-btn"><i class="ph ph-x"></i><span>Close</span></button>
    </div>
  </div>
</div>

<!-- Toast container -->
<div id="toast-container"></div>

<script>
(function () {
  'use strict';

  // ── State ──────────────────────────────────────────────────────────────
  let sessions = [];
  let capacity = null;
  let hostMetrics = null;
  let profiles = [];
  let promptReferences = [];
  let theme = localStorage.getItem('imparando_theme') || 'light';
  let refreshTimer = null;
  let currentSessionId = null;
  let term = null;
  let fitAddon = null;
  let ws = null;
  let resizeObserver = null;
  let terminalConnectionGeneration = 0;

  document.documentElement.setAttribute('data-theme', theme);

  // ── Login / Logout ─────────────────────────────────────────────────────
  document.getElementById('login-form').addEventListener('submit', async function (e) {
    e.preventDefault();
    const user = document.getElementById('login-username').value;
    const pass = document.getElementById('login-password').value;
    if (!user || !pass) return;

    const b64 = btoa(user + ':' + pass);
    const errEl = document.getElementById('login-error');
    const btn = this.querySelector('button[type="submit"]');
    btn.disabled = true;
    btn.textContent = 'Logging in\u2026';
    errEl.textContent = '';

    try {
      const res = await fetch('/api/sessions', { headers: { 'Authorization': 'Basic ' + b64 } });
      if (res.status === 401) {
        errEl.textContent = 'Invalid username or password.';
        return;
      }
      sessionStorage.setItem('imparando_creds', b64);
      document.getElementById('login-overlay').style.display = 'none';
      document.getElementById('app').style.display = '';
      onRouteChange();
    } catch (_) {
      errEl.textContent = 'Could not reach server.';
    } finally {
      btn.disabled = false;
      btn.textContent = 'Login';
    }
  });

  document.getElementById('logout-btn').addEventListener('click', function () {
    sessionStorage.removeItem('imparando_creds');
    showLoginOverlay();
  });

  function updateThemeToggle() {
    var btn = document.getElementById('theme-toggle-btn');
    if (!btn) return;
    btn.innerHTML = theme === 'dark'
      ? '<i class="ph ph-sun"></i>'
      : '<i class="ph ph-moon"></i>';
    btn.setAttribute('title', theme === 'dark' ? 'Switch to light mode' : 'Switch to dark mode');
    btn.setAttribute('aria-label', theme === 'dark' ? 'Switch to light mode' : 'Switch to dark mode');
  }

  document.getElementById('theme-toggle-btn').addEventListener('click', function () {
    theme = theme === 'dark' ? 'light' : 'dark';
    localStorage.setItem('imparando_theme', theme);
    document.documentElement.setAttribute('data-theme', theme);
    updateThemeToggle();
  });

  updateThemeToggle();

  function showLoginOverlay(msg) {
    stopAutoRefresh();
    teardownTerminal();
    document.getElementById('app').style.display = 'none';
    document.getElementById('login-overlay').style.display = 'flex';
    document.getElementById('login-error').textContent = msg || '';
  }

  // ── Toast ──────────────────────────────────────────────────────────────
  function showToast(msg, type) {
    type = type || '';
    const el = document.createElement('div');
    el.className = 'toast' + (type ? ' ' + type : '');
    el.textContent = msg;
    document.getElementById('toast-container').appendChild(el);
    setTimeout(function() { el.remove(); }, 3500);
  }

  // ── Routing ────────────────────────────────────────────────────────────
  function getRoute() {
    const hash = location.hash || '#/';
    const sessionMatch = hash.match(/^#\/session\/([0-9a-f-]+)$/i);
    if (sessionMatch) return { view: 'session', id: sessionMatch[1] };
    return { view: 'dashboard' };
  }

  function navigate(path) {
    location.hash = path;
  }

  window.addEventListener('hashchange', onRouteChange);

  function onRouteChange() {
    const route = getRoute();
    if (route.view === 'session') {
      showTerminalView(route.id);
    } else {
      showDashboardView();
    }
  }

  // ── View switching ─────────────────────────────────────────────────────
  function showDashboardView() {
    document.getElementById('dashboard-view').classList.add('active');
    document.getElementById('terminal-view').classList.remove('active');
    teardownTerminal();
    startAutoRefresh();
    loadSessions();
  }

  function showTerminalView(sessionId) {
    document.getElementById('terminal-view').classList.add('active');
    document.getElementById('dashboard-view').classList.remove('active');
    stopAutoRefresh();

    currentSessionId = sessionId;

    var session = sessions.find(function(s) { return s.id === sessionId; });
    document.getElementById('terminal-session-name').textContent =
      session ? session.name : sessionId;

    document.getElementById('terminal-stop-btn').onclick = async function() {
      if (!confirm('Delete this session? This cannot be undone.')) return;
      try {
        await apiFetch('/api/sessions/' + sessionId, { method: 'DELETE' });
        navigate('#/');
      } catch (e) {
        showToast('Failed to delete session: ' + e.message, 'error');
      }
    };

    setupTerminal(sessionId);
  }

  // ── Auth helpers ───────────────────────────────────────────────────────
  function getAuthHeader() {
    return 'Basic ' + sessionStorage.getItem('imparando_creds');
  }

  function handleUnauthorized() {
    showLoginOverlay('Session expired. Please log in again.');
  }

  // ── API helpers ────────────────────────────────────────────────────────
  async function apiFetch(path, opts) {
    opts = opts || {};
    var res = await fetch(path, {
      headers: Object.assign({
        'Content-Type': 'application/json',
        'Authorization': getAuthHeader(),
      }, opts.headers || {}),
      method: opts.method,
      body: opts.body,
    });
    if (res.status === 401) {
      handleUnauthorized();
      throw new Error('Unauthorized');
    }
    if (!res.ok) {
      var msg = 'HTTP ' + res.status;
      try { var j = await res.json(); msg = j.error || j.message || msg; } catch (_) {}
      throw new Error(msg);
    }
    var ct = res.headers.get('content-type') || '';
    if (ct.indexOf('application/json') >= 0) return res.json();
    return null;
  }

  // ── Sessions ───────────────────────────────────────────────────────────
  async function loadSessions() {
    try {
      sessions = await apiFetch('/api/sessions');
      capacity = await apiFetch('/api/capacity');
      hostMetrics = await apiFetch('/api/host-metrics');
      profiles = await apiFetch('/api/profiles');
      promptReferences = await apiFetch('/api/prompts');
      renderProfiles();
      renderPromptReferences();
      renderSessions();
      renderCapacity();
    } catch (e) {
      document.getElementById('session-list').innerHTML =
        '<div class="empty-state" style="color:var(--badge-failed)">Failed to load sessions: ' + escHtml(e.message) + '</div>';
    }
  }

  function startAutoRefresh() {
    stopAutoRefresh();
    refreshTimer = setInterval(function() {
      var indicator = document.getElementById('refresh-indicator');
      if (indicator) indicator.textContent = '';
      loadSessions();
    }, 5000);
  }

  function stopAutoRefresh() {
    if (refreshTimer) { clearInterval(refreshTimer); refreshTimer = null; }
  }

  function escHtml(str) {
    return String(str)
      .replace(/&/g, '&amp;')
      .replace(/</g, '&lt;')
      .replace(/>/g, '&gt;')
      .replace(/"/g, '&quot;');
  }

  function statusClass(status) {
    var valid = ['creating','starting','running','stopping','stopped','failed'];
    return valid.indexOf(status) >= 0 ? 'status-' + status : 'status-unknown';
  }

  function formatUptime(createdAt) {
    if (!createdAt) return '';
    var diffMs = Date.now() - new Date(createdAt).getTime();
    if (isNaN(diffMs) || diffMs < 0) return '';
    var totalSec = Math.floor(diffMs / 1000);
    var d = Math.floor(totalSec / 86400);
    var h = Math.floor((totalSec % 86400) / 3600);
    var m = Math.floor((totalSec % 3600) / 60);
    var s = totalSec % 60;
    if (d > 0) return d + 'd ' + h + 'h';
    if (h > 0) return h + 'h ' + m + 'm';
    if (m > 0) return m + 'm ' + s + 's';
    return s + 's';
  }

  function formatMemoryMb(memoryMb) {
    if (memoryMb >= 1024) {
      var gib = memoryMb / 1024;
      return (Math.round(gib * 10) / 10) + ' GiB';
    }
    return memoryMb + ' MiB';
  }

  function formatPercent(value) {
    if (value === null || value === undefined || isNaN(value)) return '?';
    return (Math.round(value * 10) / 10) + '%';
  }

  function formatLoad(value) {
    if (value === null || value === undefined || isNaN(value)) return '?';
    return String(Math.round(value * 100) / 100);
  }

  function formatHostUptime(seconds) {
    if (seconds === null || seconds === undefined || isNaN(seconds)) return '?';
    var d = Math.floor(seconds / 86400);
    var h = Math.floor((seconds % 86400) / 3600);
    var m = Math.floor((seconds % 3600) / 60);
    if (d > 0) return d + 'd ' + h + 'h';
    if (h > 0) return h + 'h ' + m + 'm';
    return m + 'm';
  }

  function renderCapacity() {
    var budgetGrid = document.getElementById('budget-grid');
    var nodeGrid = document.getElementById('node-metrics-grid');
    var hint = document.getElementById('capacity-hint');
    if (!budgetGrid || !nodeGrid || !hint || !capacity) {
      return;
    }

    var remainingSessions = Math.max(0, capacity.max_sessions - capacity.active_sessions);
    var remainingVcpus = Math.max(0, capacity.max_total_vcpus - capacity.used_vcpus);
    var remainingMemoryMb = Math.max(0, capacity.max_total_memory_mb - capacity.used_memory_mb);
    budgetGrid.innerHTML =
      '<div class="ledger-item" data-hint="' + escHtml(String(capacity.max_sessions)) + ' max | ' + escHtml(String(remainingSessions)) + ' free">' +
        '<div class="ledger-label">Sessions</div>' +
        '<div class="ledger-value">' + escHtml(String(capacity.active_sessions)) + '</div>' +
      '</div>' +
      '<div class="ledger-item" data-hint="' + escHtml(String(capacity.max_total_vcpus)) + ' max | ' + escHtml(String(remainingVcpus)) + ' free">' +
        '<div class="ledger-label">vCPU</div>' +
        '<div class="ledger-value">' + escHtml(String(capacity.used_vcpus)) + '</div>' +
      '</div>' +
      '<div class="ledger-item" data-hint="' + escHtml(formatMemoryMb(capacity.max_total_memory_mb)) + ' max | ' + escHtml(formatMemoryMb(remainingMemoryMb)) + ' free">' +
        '<div class="ledger-label">Memory</div>' +
        '<div class="ledger-value">' + escHtml(formatMemoryMb(capacity.used_memory_mb)) + '</div>' +
      '</div>';

    if (!hostMetrics) {
      nodeGrid.innerHTML = '';
      return;
    }

    var memoryUsedPercent = hostMetrics.total_memory_mb > 0 ? (hostMetrics.used_memory_mb / hostMetrics.total_memory_mb) * 100 : 0;
    var diskUsedMb = Math.max(0, hostMetrics.root_total_disk_mb - hostMetrics.root_available_disk_mb);
    var diskUsedPercent = hostMetrics.root_total_disk_mb > 0 ? (diskUsedMb / hostMetrics.root_total_disk_mb) * 100 : 0;
    var swapUsedPercent = hostMetrics.total_swap_mb > 0 ? (hostMetrics.used_swap_mb / hostMetrics.total_swap_mb) * 100 : 0;

    nodeGrid.innerHTML =
      '<div class="ledger-item" data-hint="load ' +
          escHtml(formatLoad(hostMetrics.load_average_one)) + ' ' +
          escHtml(formatLoad(hostMetrics.load_average_five)) + ' ' +
          escHtml(formatLoad(hostMetrics.load_average_fifteen)) +
        '">' +
        '<div class="ledger-label">CPU</div>' +
        '<div class="ledger-value">' + escHtml(formatPercent(hostMetrics.cpu_usage_percent)) + '</div>' +
      '</div>' +
      '<div class="ledger-item" data-hint="' + escHtml(formatMemoryMb(hostMetrics.total_memory_mb)) + ' total | ' + escHtml(formatMemoryMb(hostMetrics.available_memory_mb)) + ' free">' +
        '<div class="ledger-label">Memory</div>' +
        '<div class="ledger-value">' + escHtml(formatMemoryMb(hostMetrics.used_memory_mb)) + '</div>' +
      '</div>' +
      '<div class="ledger-item" data-hint="' + escHtml(formatMemoryMb(hostMetrics.root_total_disk_mb)) + ' total | ' + escHtml(formatMemoryMb(hostMetrics.root_available_disk_mb)) + ' free">' +
        '<div class="ledger-label">Disk</div>' +
        '<div class="ledger-value">' + escHtml(formatMemoryMb(diskUsedMb)) + '</div>' +
      '</div>' +
      '<div class="ledger-item" data-hint="' + escHtml(formatMemoryMb(hostMetrics.total_swap_mb)) + ' total">' +
        '<div class="ledger-label">Swap</div>' +
        '<div class="ledger-value">' + escHtml(formatMemoryMb(hostMetrics.used_swap_mb)) + '</div>' +
      '</div>';

    hint.textContent =
      remainingVcpus + ' vCPU free, ' +
      formatMemoryMb(remainingMemoryMb) + ' free, ' +
      remainingSessions + ' session slots free.';
  }

  function renderProfiles() {
    var select = document.getElementById('f-profile');
    var hint = document.getElementById('profile-hint');
    if (!select || !hint || !profiles) {
      return;
    }

    select.innerHTML = profiles.map(function(p) {
      return '<option value="' + escHtml(p.kind) + '">' + escHtml(p.name) + '</option>';
    }).join('');

    applySelectedProfileDefaults();
  }

  function renderPromptReferences() {
    var container = document.getElementById('prompt-list');
    if (!container) return;
    if (!promptReferences || promptReferences.length === 0) {
      container.innerHTML = '<div class="empty-state"><p>No prompt references are available.</p></div>';
      return;
    }

    container.innerHTML = promptReferences.map(function (prompt) {
      return '' +
        '<div class="session-card" style="cursor:default;">' +
          '<div class="session-card-top">' +
            '<div class="session-name">' + escHtml(prompt.title) + '</div>' +
            '<div class="session-actions">' +
              '<button class="btn btn-sm" onclick="copyPromptPath(\'' + escHtml(prompt.id) + '\')"><i class="ph ph-link"></i><span>Copy Path</span></button>' +
              '<button class="btn btn-sm" onclick="copyPromptBody(\'' + escHtml(prompt.id) + '\')"><i class="ph ph-copy"></i><span>Copy Prompt</span></button>' +
            '</div>' +
          '</div>' +
          '<div class="session-meta"><span>' + escHtml(prompt.summary) + '</span></div>' +
          '<div class="session-repos"><span class="repo-link">' + escHtml(prompt.vm_path) + '</span></div>' +
        '</div>';
    }).join('');
  }

  function applySelectedProfileDefaults() {
    var select = document.getElementById('f-profile');
    var hint = document.getElementById('profile-hint');
    if (!select || !hint || !profiles || profiles.length === 0) {
      return;
    }

    var profile = profiles.find(function(p) { return p.kind === select.value; }) || profiles[0];
    if (!profile) {
      return;
    }

    var vcpuSelect = document.getElementById('f-vcpus');
    var memorySelect = document.getElementById('f-memory');
    if (vcpuSelect) vcpuSelect.value = String(profile.default_vcpus);
    if (memorySelect) memorySelect.value = String(profile.default_memory_mb);

    hint.textContent =
      profile.description + ' | default ' +
      profile.default_vcpus + ' vCPU, ' +
      formatMemoryMb(profile.default_memory_mb) + ' RAM, ' +
      formatMemoryMb(profile.disk_mb) + ' disk';
  }

  function renderSessions() {
    var container = document.getElementById('session-list');
    if (!sessions || sessions.length === 0) {
      container.innerHTML =
        '<div class="empty-state">' +
        '<div class="empty-state-icon">&gt;_</div>' +
        '<p>No sessions yet. Spin up a cloud environment to get started.</p>' +
        '<button class="btn btn-primary" onclick="document.getElementById(\'new-session-btn\').click()">Create Session</button>' +
        '</div>';
      return;
    }

    container.innerHTML = sessions.map(function(s) {
      var repos = Array.isArray(s.repos) ? s.repos : [];
      var repoChips = repos.map(function(r) {
        return '<span class="repo-link">' + escHtml(r.replace(/^https?:\/\/(www\.)?github\.com\//, '')) + '</span>';
      }).join('');

      var canOpen = s.status === 'running';
      var agent = s.agent === 'codex' ? 'Codex' : 'Claude';
      var profile = profiles.find(function(p) { return p.kind === s.image_profile; });
      var profileName = profile ? profile.name : (s.image_profile || 'unknown');

      return '<div class="session-card" data-id="' + escHtml(s.id) + '"' +
        (canOpen ? ' onclick="openSession(\'' + escHtml(s.id) + '\')"' : '') + '>' +
        '<div class="session-card-top">' +
        '<div class="session-name">' +
        escHtml(s.name) +
        ' <span class="status-dot ' + statusClass(s.status) + '">' + escHtml(s.status || 'unknown') + '</span>' +
        '</div>' +
        '<div class="session-actions">' +
        '<button class="btn btn-sm" onclick="event.stopPropagation();openSession(\'' + escHtml(s.id) + '\')"' +
        (canOpen ? '' : ' disabled') + '><i class="ph ph-arrow-square-out"></i><span>Open</span></button>' +
        '<button class="btn btn-sm btn-icon btn-danger" aria-label="Delete session" title="Delete session" onclick="event.stopPropagation();deleteSession(\'' + escHtml(s.id) + '\')"><i class="ph ph-trash"></i></button>' +
        '</div></div>' +
        '<div class="session-meta">' +
        '<span>' + escHtml(profileName) + '</span>' +
        '<span>' + escHtml(agent) + '</span>' +
        '<span>' + escHtml(String(s.vcpus || '?')) + ' vCPU</span>' +
        '<span>' + escHtml(String(s.memory_mb || '?')) + ' MB RAM</span>' +
        (s.created_at ? '<span>' + escHtml(formatUptime(s.created_at)) + ' uptime</span>' : '') +
        '</div>' +
        (repos.length > 0 ? '<div class="session-repos">' + repoChips + '</div>' : '') +
        '</div>';
    }).join('');
  }

  // ── Session actions ────────────────────────────────────────────────────
  window.openSession = function (id) {
    navigate('#/session/' + id);
  };

  window.stopSession = async function (id) {
    try {
      await apiFetch('/api/sessions/' + id + '/stop', { method: 'PUT' });
      showToast('Session stop requested.', 'success');
      await loadSessions();
    } catch (e) {
      showToast('Failed to stop session: ' + e.message, 'error');
    }
  };

  window.deleteSession = async function (id) {
    if (!confirm('Delete this session? This cannot be undone.')) return;
    try {
      await apiFetch('/api/sessions/' + id, { method: 'DELETE' });
      showToast('Session deleted.', 'success');
      await loadSessions();
    } catch (e) {
      showToast('Failed to delete session: ' + e.message, 'error');
    }
  };

  document.getElementById('prompts-btn').addEventListener('click', openPromptModal);
  document.getElementById('prompt-close-btn').addEventListener('click', closePromptModal);
  document.getElementById('prompt-modal').addEventListener('click', function (e) {
    if (e.target === this) closePromptModal();
  });

  function openPromptModal() {
    renderPromptReferences();
    document.getElementById('prompt-modal').classList.add('open');
  }

  function closePromptModal() {
    document.getElementById('prompt-modal').classList.remove('open');
  }

  window.copyPromptPath = async function (id) {
    var prompt = (promptReferences || []).find(function (entry) { return entry.id === id; });
    if (!prompt) return;
    try {
      await navigator.clipboard.writeText(prompt.vm_path);
      showToast('Prompt path copied.', 'success');
    } catch (_) {
      showToast('Failed to copy prompt path.', 'error');
    }
  };

  window.copyPromptBody = async function (id) {
    var prompt = (promptReferences || []).find(function (entry) { return entry.id === id; });
    if (!prompt) return;
    try {
      await navigator.clipboard.writeText(prompt.body);
      showToast('Prompt copied.', 'success');
    } catch (_) {
      showToast('Failed to copy prompt.', 'error');
    }
  };

  // ── New Session modal ──────────────────────────────────────────────────
  document.getElementById('new-session-btn').addEventListener('click', openModal);
  document.getElementById('modal-cancel-btn').addEventListener('click', closeModal);
  document.getElementById('f-profile').addEventListener('change', applySelectedProfileDefaults);
  document.getElementById('new-session-modal').addEventListener('click', function (e) {
    if (e.target === this) closeModal();
  });

  function openModal() {
    document.getElementById('new-session-form').reset();
    document.getElementById('form-error').textContent = '';
    document.getElementById('new-session-modal').classList.add('open');
    renderProfiles();
    renderCapacity();
    document.getElementById('f-name').focus();
  }

  function closeModal() {
    document.getElementById('new-session-modal').classList.remove('open');
  }

  document.getElementById('new-session-form').addEventListener('submit', async function (e) {
    e.preventDefault();
    var errEl = document.getElementById('form-error');
    errEl.textContent = '';

    var name = document.getElementById('f-name').value.trim();
    var reposRaw = document.getElementById('f-repos').value.trim();
    var image_profile = document.getElementById('f-profile').value;
    var agent = document.getElementById('f-agent').value;
    var vcpus = parseInt(document.getElementById('f-vcpus').value, 10);
    var memory_mb = parseInt(document.getElementById('f-memory').value, 10);
    var private_repos = document.getElementById('f-private-repos').checked;

    if (!name) { errEl.textContent = 'Name is required.'; return; }

    var repos = reposRaw
      ? reposRaw.split('\n').map(function(r) { return r.trim(); }).filter(Boolean)
      : [];

    var submitBtn = document.getElementById('modal-submit-btn');
    submitBtn.disabled = true;
    submitBtn.textContent = 'Creating\u2026';

    try {
      await apiFetch('/api/sessions', {
        method: 'POST',
        body: JSON.stringify({ name: name, repos: repos, image_profile: image_profile, agent: agent, vcpus: vcpus, memory_mb: memory_mb, private_repos: private_repos }),
      });
      closeModal();
      showToast('Session created!', 'success');
      await loadSessions();
    } catch (e) {
      errEl.textContent = e.message;
    } finally {
      submitBtn.disabled = false;
      submitBtn.textContent = 'Create Session';
    }
  });

  // ── Terminal ───────────────────────────────────────────────────────────
  function setTerminalStatus(state) {
    var dot = document.getElementById('terminal-status-dot');
    var text = document.getElementById('terminal-status-text');
    dot.className = 'terminal-status-dot';
    if (state === 'connected') {
      dot.classList.add('connected');
      text.textContent = 'Connected';
    } else if (state === 'connecting') {
      dot.classList.add('connecting');
      text.textContent = 'Connecting';
    } else {
      text.textContent = 'Disconnected';
    }
  }

  function setupTerminal(sessionId) {
    teardownTerminal();
    terminalConnectionGeneration += 1;
    var connectionGeneration = terminalConnectionGeneration;

    var container = document.getElementById('terminal-container');
    container.innerHTML = '';
    setTerminalStatus('connecting');

    term = new Terminal({
      theme: {
        background: '#0a0e14',
        foreground: '#e6edf3',
        cursor:     '#58a6ff',
        cursorAccent: '#0a0e14',
        selectionBackground: 'rgba(88, 166, 255, 0.25)',
        selectionForeground: '#ffffff',
        black:   '#0a0e14',
        red:     '#f85149',
        green:   '#3fb950',
        yellow:  '#d29922',
        blue:    '#58a6ff',
        magenta: '#bc8cff',
        cyan:    '#39c5cf',
        white:   '#b1bac4',
        brightBlack:   '#6e7681',
        brightRed:     '#ff7b72',
        brightGreen:   '#56d364',
        brightYellow:  '#e3b341',
        brightBlue:    '#79c0ff',
        brightMagenta: '#d2a8ff',
        brightCyan:    '#56d4dd',
        brightWhite:   '#f0f6fc',
      },
      fontFamily: '"Berkeley Mono", "JetBrains Mono", ui-monospace, "SFMono-Regular", Menlo, Consolas, monospace',
      fontSize: 14,
      lineHeight: 1.3,
      cursorBlink: false,
      cursorStyle: 'bar',
      scrollback: 10000,
      scrollOnUserInput: true,
      scrollSensitivity: 3,
      fastScrollSensitivity: 5,
      allowTransparency: false,
    });

    fitAddon = new FitAddon.FitAddon();
    term.loadAddon(fitAddon);
    term.open(container);
    fitAddon.fit();
    if (term.attachCustomWheelEventHandler) {
      term.attachCustomWheelEventHandler(function() { return true; });
    }

    connectWebSocket(sessionId, connectionGeneration);

    resizeObserver = new ResizeObserver(function() {
      fitAddon.fit();
      sendResize();
    });
    resizeObserver.observe(container);

    term.onData(function(data) {
      if (ws && ws.readyState === WebSocket.OPEN) {
        var encoder = new TextEncoder();
        var encoded = encoder.encode(data);
        var msg = new Uint8Array(1 + encoded.length);
        msg[0] = 0x30; // '0' = INPUT
        msg.set(encoded, 1);
        ws.send(msg.buffer);
      }
    });
  }

  function connectWebSocket(sessionId, connectionGeneration) {
    var proto = location.protocol === 'https:' ? 'wss' : 'ws';
    var url = proto + '://' + location.host + '/api/sessions/' + sessionId + '/terminal';
    var socket = new WebSocket(url);
    socket.binaryType = 'arraybuffer';
    ws = socket;

    socket.onopen = function() {
      if (connectionGeneration !== terminalConnectionGeneration || ws !== socket) {
        socket.close();
        return;
      }
      setTerminalStatus('connected');
      sendResize();
    };

    socket.onmessage = function(event) {
      if (connectionGeneration !== terminalConnectionGeneration || ws !== socket || !term) return;
      if (!(event.data instanceof ArrayBuffer)) return;
      var view = new Uint8Array(event.data);
      if (view.length === 0) return;
      if (view[0] === 0x30) { // OUTPUT
        term.write(view.slice(1));
      }
    };

    socket.onclose = function(event) {
      if (ws === socket) {
        ws = null;
      }
      if (connectionGeneration !== terminalConnectionGeneration) return;
      setTerminalStatus('disconnected');
      if (term) {
        term.write('\r\n\x1b[2m\x1b[38;5;245m--- connection closed (' + event.code + ') ---\x1b[0m\r\n');
      }
    };

    socket.onerror = function() {
      if (connectionGeneration !== terminalConnectionGeneration || ws !== socket) return;
      setTerminalStatus('disconnected');
      if (term) {
        term.write('\r\n\x1b[31m--- connection error ---\x1b[0m\r\n');
      }
    };
  }

  function sendResize() {
    if (!term || !ws || ws.readyState !== WebSocket.OPEN) return;
    var payload = JSON.stringify({ columns: term.cols, rows: term.rows });
    var encoder = new TextEncoder();
    var encoded = encoder.encode(payload);
    var msg = new Uint8Array(1 + encoded.length);
    msg[0] = 0x31; // '1' = RESIZE_TERMINAL
    msg.set(encoded, 1);
    ws.send(msg.buffer);
  }

  function teardownTerminal() {
    terminalConnectionGeneration += 1;
    if (resizeObserver) { resizeObserver.disconnect(); resizeObserver = null; }
    if (ws) { ws.close(); ws = null; }
    if (term) { term.dispose(); term = null; }
    fitAddon = null;
    currentSessionId = null;
    document.getElementById('terminal-container').innerHTML = '';
  }

  // ── Back button ────────────────────────────────────────────────────────
  document.getElementById('back-btn').addEventListener('click', function(e) {
    e.preventDefault();
    navigate('#/');
  });

  // ── Keyboard shortcuts ─────────────────────────────────────────────────
  document.addEventListener('keydown', function(e) {
    if (e.key === 'Escape') {
      var modal = document.getElementById('new-session-modal');
      if (modal.classList.contains('open')) closeModal();
    }
  });

  // ── Boot ───────────────────────────────────────────────────────────────
  if (sessionStorage.getItem('imparando_creds')) {
    document.getElementById('login-overlay').style.display = 'none';
    onRouteChange();
  } else {
    document.getElementById('app').style.display = 'none';
    document.getElementById('login-overlay').style.display = 'flex';
  }

})();
</script>
</body>
</html>
